services:
  db:
    image: postgis/postgis:15-3.4
    container_name: bfpacs_db
    env_file:
      - path: ./.env
        required: false
    environment:
      POSTGRES_USER: bfp_admin
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_this_password_before_going_to_production}
      POSTGRES_DB: bfpacs_db
    volumes:
      - bfpacs_pgdata:/var/lib/postgresql/data
      - ./bfpacs_backup.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    networks:
      - web-proxy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bfp_admin -d bfpacs_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bfpacs_backend
    env_file:
      - path: ./.env
        required: false
    environment:
      - DATABASE_URL=postgres://bfp_admin:${DB_PASSWORD:-change_this_password_before_going_to_production}@db:5432/bfpacs_db?sslmode=disable
      - JWT_SECRET=${JWT_SECRET:-change_this_secret_before_going_to_production}
      - GIN_MODE=${GIN_MODE:-release}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - web-proxy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "-O", "/dev/null", "http://localhost:8080/api/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=/api/v1
    container_name: bfpacs_frontend
    expose:
      - "80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - web-proxy

volumes:
  bfpacs_pgdata:

networks:
  web-proxy:
    external: true
