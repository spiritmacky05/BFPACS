services:
  db:
    image: postgis/postgis:15-3.4
    container_name: bfpacs_db
    environment:
      POSTGRES_USER: bfp_admin
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: bfpacs_db
    volumes:
      - bfpacs_pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - web-proxy
    # Added this back so the backend knows when to start
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bfp_admin -d bfpacs_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bfpacs_backend
    environment:
      - DATABASE_URL=postgres://bfp_admin:${DB_PASSWORD}@db:5432/bfpacs_db?sslmode=disable
      - JWT_SECRET=${JWT_SECRET}
      - GIN_MODE=release
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - web-proxy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=/api/v1
    container_name: bfpacs_frontend
    expose:
      - "80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - web-proxy

volumes:
  bfpacs_pgdata:

networks:
  web-proxy:
    external: true
