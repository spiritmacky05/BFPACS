services:
  db:
    image: postgis/postgis:15-3.4
    container_name: bfpacs_db
    environment:
      POSTGRES_USER: bfp_admin
      POSTGRES_PASSWORD: ${DB_PASSWORD:-Ultraman13}
      POSTGRES_DB: bfpacs_db
    ports:
      - "5433:5432"
    volumes:
      - bfpacs_pgdata:/var/lib/postgresql/data
      - ./bfpacs_backup.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bfp_admin -d bfpacs_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: bfpacs_backend
    environment:
      - DATABASE_URL=postgres://bfp_admin:${DB_PASSWORD:-Ultraman13}@db:5432/bfpacs_db
      - JWT_SECRET=${JWT_SECRET:-change_this_secret_before_going_to_production}
      - GIN_MODE=${GIN_MODE:-release}
    ports:
      - "8081:8080"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        - VITE_API_URL=/api/v1
    container_name: bfpacs_frontend
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  bfpacs_pgdata:
