root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/api-server ./cmd/api/main.go"
  bin = "./tmp/api-server"
  include_ext = ["go", "tpl", "tmpl", "html", "env"]
  exclude_dir = ["tmp", "vendor", "testdata"]
  delay = 500
  stop_on_error = true

[log]
  time = true

[color]
  app = "green"
  build = "yellow"
  main = "magenta"
  runner = "cyan"
  watcher = "blue"
