services:
  db:
    image: postgis/postgis:15-3.4
    container_name: bfpacs_db_dev
    environment:
      POSTGRES_USER: bfp_admin
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: bfpacs_db
    ports:
      - "5432:5432"
    volumes:
      - bfpacs_pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bfp_admin -d bfpacs_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: bfpacs_backend_dev
    environment:
      DATABASE_URL: postgres://bfp_admin:${DB_PASSWORD}@db:5432/bfpacs_db?sslmode=disable
      JWT_SECRET: ${JWT_SECRET}
      GIN_MODE: debug
      PORT: "8080"
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app
      - bfpacs_go_mod_cache:/go/pkg/mod
      - bfpacs_go_build_cache:/root/.cache/go-build
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: bfpacs_frontend_dev
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8080/api/v1}
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - bfpacs_frontend_node_modules:/app/node_modules
    depends_on:
      - backend

volumes:
  bfpacs_pgdata_dev:
  bfpacs_go_mod_cache:
  bfpacs_go_build_cache:
  bfpacs_frontend_node_modules:
